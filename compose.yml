services:
  habitat-calibre:
    build:
      context: .
      dockerfile: Dockerfile
    image: habitat-calibre:latest
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      CALIBRE_LIBRARY_PATH: /library
      CALIBRE_CACHE_TTL_SECONDS: 45
      SESSION_SECRET: ${SESSION_SECRET:-change-this-session-secret-before-production-use-1234567890}
      AUTH_PLEX_MODE: ${AUTH_PLEX_MODE:-allowlist_or_shared}
      PLEX_ALLOWED_EMAILS: ${PLEX_ALLOWED_EMAILS:-}
      PLEX_SERVER_MACHINE_ID: ${PLEX_SERVER_MACHINE_ID:-}
      REQUEST_DELIVERY_MODE: ${REQUEST_DELIVERY_MODE:-lazylibrarian}
      LAZYLIBRARIAN_BASE_URL: ${LAZYLIBRARIAN_BASE_URL:-}
      LAZYLIBRARIAN_API_KEY: ${LAZYLIBRARIAN_API_KEY:-}
      LAZYLIBRARIAN_MATCH_THRESHOLD: ${LAZYLIBRARIAN_MATCH_THRESHOLD:-84}
      SHELFMARK_BASE_URL: ${SHELFMARK_BASE_URL:-}
      SHELFMARK_USERNAME: ${SHELFMARK_USERNAME:-}
      SHELFMARK_PASSWORD: ${SHELFMARK_PASSWORD:-}
      SHELFMARK_HTTP_TIMEOUT_MS: ${SHELFMARK_HTTP_TIMEOUT_MS:-12000}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      TELEGRAM_THREAD_ID: ${TELEGRAM_THREAD_ID:-}
    volumes:
      - ${CALIBRE_HOST_PATH:-/Users/YOUR_USER/Dropbox/Library/eBooks/Calibre}:/library:ro
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 8s
      retries: 3
      start_period: 20s
