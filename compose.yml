services:
  habitat-calibre:
    build:
      context: .
      dockerfile: Dockerfile
    image: habitat-calibre:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      CALIBRE_LIBRARY_PATH: /library
      CALIBRE_CACHE_TTL_SECONDS: 45
    volumes:
      - ${CALIBRE_HOST_PATH:-/Users/YOUR_USER/Dropbox/Library/eBooks/Calibre}:/library:ro
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 8s
      retries: 3
      start_period: 20s
